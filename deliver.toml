[[file]]
path = "Cargo.toml"
required = true

[[file]]
path = "src/main.rs"
required = true
forbid_regex = ["TODO", "FIXME", "unimplemented!", "panic!"]

[[file]]
path = "src/lib.rs"
required = true

[[file]]
path = "README.md"
required = true

[[file]]
path = "install.sh"
required = true

[[file]]
path = "deliver.toml"
required = true

[[file]]
path = "docs/branding.md"
required = true

[[file]]
path = "scripts/generate-logo.py"
required = true

[[command]]
name = "cargo check"
cmd = ["cargo", "check"]
expect_exit = 0
timeout_secs = 300

[[command]]
name = "cargo test"
cmd = ["cargo", "test"]
expect_exit = 0
timeout_secs = 300

[[command]]
name = "deckhand status"
cmd = ["cargo", "run", "--", "status"]
expect_exit = 0
timeout_secs = 60

[[command]]
name = "validate logo assets"
cmd = ["file", "assets/logo.png", "assets/logo-wide.png", "assets/favicon.png"]
expect_exit = 0
timeout_secs = 10
stdout_contains = ["PNG image data", "PNG image data"]
