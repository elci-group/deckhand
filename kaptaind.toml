# kaptaind configuration — auto-generated by `kaptaind-cli init`

[watch]
path = "."
recursive = true
ignore_file = ".kaptainignore"

[cluster]
window = 5
# max_paths = 0      # flush cluster after N events (0 = disabled)
# flush_after = 10   # idle timeout in seconds (defaults to window)

[weights]
s = 0.35
a = 0.30
d = 0.20
r = 0.15

[push]
enabled = true
branch = "master"

[push.safety]
protect_branches = []

[capabilities]
network_push = true

[version_thresholds]
patch = 0.0
minor = 0.6

[conflict]
auto_rebase = true

[ratelimit]
min_commit_interval = 10

[test]
command = "cargo test && ./install.sh"
required = true

# [staging]
# mode = "all"        # "all" (default), "cluster" (only changed files), or "pattern"
# include = ["src/**"] # only used in "pattern" mode
# exclude = ["*.log", ".env*"]
